<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Employee Registration{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .form-panel { max-width: 480px; margin: 32px auto; box-shadow: 0 2px 16px rgba(0,0,0,0.07); border-radius: 16px; background: #fff; padding: 24px; }
        @media (max-width: 600px) {
            .form-panel { margin: 0; border-radius: 0; min-height: 100vh; box-shadow: none; }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
