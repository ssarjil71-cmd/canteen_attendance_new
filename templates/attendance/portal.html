<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance - {{ company.company_name }}</title>
    <link href="/static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #ffffff;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px 0;
        }
        
        .attendance-container {
            max-width: 420px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .attendance-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            padding: 20px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
        }
        
        .company-header {
            text-align: center;
            margin-bottom: 22px;
        }
        
        .company-header h2 {
            color: #111827;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 1.55rem;
        }
        
        .company-header p {
            color: #6b7280;
            margin: 0;
            font-size: 0.92rem;
        }
        
        .form-section {
            margin-bottom: 18px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eceff3;
        }
        
        .section-header h5 {
            margin: 0;
            color: #111827;
            font-weight: 600;
        }
        
        .section-header i {
            font-size: 1rem;
            margin-right: 8px;
            color: #111827;
        }
        
        .camera-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0 12px;
            height: 260px;
        }
        
        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #detectionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .face-guide {
            text-align: center;
        }
        
        .face-outline {
            width: 150px;
            height: 150px;
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            margin: 0 auto 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { border-color: rgba(255, 255, 255, 0.8); }
            50% { border-color: rgba(40, 167, 69, 0.8); }
            100% { border-color: rgba(255, 255, 255, 0.8); }
        }
        
        .guide-text {
            color: white;
            font-size: 13px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 15px;
            display: inline-block;
        }

        .capture-hint {
            color: #374151;
            font-size: 0.9rem;
            font-weight: 600;
            margin: 4px 0 8px;
        }
        
        .status-message {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 999px;
            margin: 6px 0;
            font-weight: 600;
            font-size: 0.84rem;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            color: #111827;
        }
        
        .status-success {
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #d1d5db;
        }
        
        .status-error {
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #d1d5db;
        }
        
        .status-info {
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        .status-warning {
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #d1d5db;
        }
        
        .captured-preview {
            text-align: center;
            margin: 12px 0;
        }
        
        .captured-preview img {
            width: 160px;
            height: 130px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #d1d5db;
        }
        
        .btn-primary {
            background: #111827;
            border: 1px solid #111827;
            border-radius: 12px;
            padding: 11px 14px;
            font-weight: 600;
            margin: 4px 0;
            width: 100%;
        }
        
        .btn-secondary {
            background: #ffffff;
            color: #111827;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 11px 14px;
            font-weight: 600;
            margin: 4px 0;
            width: 100%;
        }
        
        .btn-success {
            background: #111827;
            border: 1px solid #111827;
            border-radius: 12px;
            padding: 11px 14px;
            font-weight: 600;
            margin: 4px 0;
            width: 100%;
        }
        
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
        
        .camera-controls {
            text-align: center;
            margin-top: 15px;
        }
        
        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            border: 1px solid #d1d5db;
            margin-bottom: 8px;
            background: #f9fafb;
            color: #111827;
        }

        .location-badge.loading {
            background: #f9fafb;
            color: #111827;
            border-color: #d1d5db;
        }

        .location-badge.verified {
            background: #f9fafb;
            color: #111827;
            border-color: #d1d5db;
        }

        .location-badge.not-verified {
            background: #f9fafb;
            color: #111827;
            border-color: #d1d5db;
        }

        .success-card {
            border: 1px solid #d1fae5;
            background: #f0fdf4;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
        }

        .success-card h4 {
            margin-top: 10px;
            margin-bottom: 8px;
            color: #166534;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .meal-prompt-card {
            margin-top: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
            padding: 12px;
            text-align: left;
        }

        .meal-prompt-card h6 {
            font-size: 0.98rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 10px;
        }

        .meal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-meal-yes {
            background: #111827;
            color: #ffffff;
            border: 1px solid #111827;
            border-radius: 10px;
            padding: 9px 10px;
            font-weight: 600;
        }

        .btn-meal-no {
            background: #ffffff;
            color: #111827;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 9px 10px;
            font-weight: 600;
        }

        .meal-feedback {
            margin-top: 10px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 10px;
            padding: 10px;
            color: #111827;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .menu-display {
            margin-top: 10px;
            border: 1px solid #dbe3ef;
            background: #ffffff;
            border-radius: 10px;
            padding: 10px;
            text-align: left;
        }

        .menu-display h6 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-bottom: 1px dashed #e5e7eb;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .menu-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        @media (max-width: 576px) {
            body {
                padding: 6px 0;
            }

            .attendance-container {
                padding: 8px;
            }

            .attendance-card {
                padding: 14px;
                border-radius: 14px;
            }

            .company-header {
                margin-bottom: 14px;
            }

            .camera-container {
                height: 220px;
            }

            .captured-preview img {
                width: 140px;
                height: 112px;
            }
        }
    </style>
</head>
<body>
    <div class="attendance-container">
        <div class="attendance-card">
            <div class="company-header">
                <h2>{{ company.company_name }}</h2>
                <p>QR-Based Face Recognition Attendance</p>
            </div>
            
            <!-- Location Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="bi bi-geo-alt"></i>
                    <h5>Location Verification</h5>
                </div>
                <div id="locationBadge" class="location-badge loading">
                    <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                    <span>Detecting location...</span>
                </div>
                <div class="status-message status-info" id="locationStatus">
                    <i class="bi bi-geo-alt me-2"></i>Detecting location...
                </div>
            </div>
            
            <!-- Face Capture Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="bi bi-camera"></i>
                    <h5>Face Verification</h5>
                </div>
                <p class="capture-hint">Align your face and capture</p>
                <div class="status-message status-info" id="faceStatus">
                    <i class="bi bi-camera me-2"></i>Click "Start Camera" to capture your face for verification
                </div>
                <div class="camera-container" id="cameraContainer" style="display: none;">
                    <video id="cameraVideo" autoplay playsinline></video>
                    <canvas id="captureCanvas" style="display: none;"></canvas>
                    <canvas id="detectionCanvas"></canvas>
                    <div class="camera-overlay">
                        <div class="face-guide">
                            <div class="face-outline"></div>
                            <p class="guide-text">Align face and wait for green box</p>
                        </div>
                    </div>
                </div>
                <div class="captured-preview" id="capturedPreview" style="display: none;">
                    <h6>Captured Face:</h6>
                    <img id="previewImage" alt="Captured face">
                </div>
                <div class="camera-controls">
                    <button class="btn btn-primary" id="startCameraBtn" onclick="initializeCamera()" style="display: none;" disabled>
                        <i class="bi bi-camera me-2"></i>Start Camera
                    </button>
                    <button class="btn btn-success" id="captureBtn" onclick="capturePhoto()" style="display: none;" disabled>
                        <i class="bi bi-camera me-2"></i>Capture Face
                    </button>
                    <button class="btn btn-secondary" id="retakeBtn" onclick="retakePhoto()" style="display: none;">
                        <i class="bi bi-arrow-clockwise me-2"></i>Retake
                    </button>
                </div>
            </div>
            
            <!-- Success and Meal Interaction -->
            <div id="successMessage" style="display: none;"></div>

            <div id="mealPromptSection" style="display: none;"></div>

            <div id="mealResultSection" style="display: none;"></div>

            <div id="menuDisplaySection" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        let userLocation = null;
        let stream = null;
        let faceImageData = null;
        let faceVerified = false;
        let detectionInterval = null;
        let liveFaceDetected = false;
        let detectionErrorStreak = 0;
        let locationDetectionStarted = false;
        let cameraAutoStarted = false;
        
        const companyId = parseInt('{{ company_id|default("0") }}') || 0;
        
        function checkRequirements() {
            return;
        }
        
        function updateLocationBadge(state, text) {
            const badge = document.getElementById('locationBadge');
            if (!badge) {
                return;
            }

            if (state === 'verified') {
                badge.className = 'location-badge verified';
                badge.innerHTML = '<i class="bi bi-check-circle"></i><span>Location Verified</span>';
                return;
            }

            if (state === 'not-verified') {
                badge.className = 'location-badge not-verified';
                badge.innerHTML = '<i class="bi bi-x-circle"></i><span>Location Not Verified</span>';
                return;
            }

            badge.className = 'location-badge loading';
            badge.innerHTML = `<span class="spinner-border spinner-border-sm" aria-hidden="true"></span><span>${text || 'Detecting location...'}</span>`;
        }

        function autoDetectLocation() {
            if (locationDetectionStarted) {
                return;
            }
            locationDetectionStarted = true;

            const statusDiv = document.getElementById('locationStatus');
            const startCameraBtn = document.getElementById('startCameraBtn');

            updateLocationBadge('loading', 'Detecting location...');
            statusDiv.innerHTML = '<i class="bi bi-geo-alt me-2"></i>Detecting location...';
            statusDiv.className = 'status-message status-info';
            
            if (!navigator.geolocation) {
                statusDiv.innerHTML = '<i class="bi bi-x-circle me-2"></i>Unable to detect location. Please try again';
                statusDiv.className = 'status-message status-error';
                updateLocationBadge('not-verified');
                startCameraBtn.disabled = true;
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    
                    // Send location to backend for verification
                    fetch('/attendance/verify-location', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            company_id: companyId,
                            latitude: latitude,
                            longitude: longitude
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            userLocation = {
                                latitude: latitude,
                                longitude: longitude
                            };
                            
                            statusDiv.innerHTML = '<i class="bi bi-check-circle me-2"></i>Location verified';
                            statusDiv.className = 'status-message status-success';
                            updateLocationBadge('verified');
                            startCameraBtn.disabled = false;
                            if (!cameraAutoStarted) {
                                cameraAutoStarted = true;
                                initializeCamera();
                            }
                            
                            checkRequirements();
                        } else {
                            userLocation = null;
                            statusDiv.innerHTML = '<i class="bi bi-x-circle me-2"></i>You are not in the allowed location';
                            statusDiv.className = 'status-message status-error';
                            updateLocationBadge('not-verified');
                            startCameraBtn.disabled = true;
                            checkRequirements();
                        }
                    })
                    .catch(error => {
                        console.error('Location verification error:', error);
                        userLocation = null;
                        statusDiv.innerHTML = '<i class="bi bi-x-circle me-2"></i>Unable to detect location. Please try again';
                        statusDiv.className = 'status-message status-error';
                        updateLocationBadge('not-verified');
                        startCameraBtn.disabled = true;
                        checkRequirements();
                    });
                },
                function(error) {
                    let errorMsg = 'Location access denied';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'Location access is required for attendance';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'Unable to detect location. Please try again';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'Unable to detect location. Please try again';
                            break;
                    }
                    
                    statusDiv.innerHTML = `<i class="bi bi-x-circle me-2"></i>${errorMsg}`;
                    statusDiv.className = 'status-message status-error';
                    updateLocationBadge('not-verified');
                    startCameraBtn.disabled = true;
                    userLocation = null;
                    checkRequirements();
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 60000
                }
            );
        }
        
        function initializeCamera() {
            const video = document.getElementById('cameraVideo');
            const cameraContainer = document.getElementById('cameraContainer');
            const startBtn = document.getElementById('startCameraBtn');
            const captureBtn = document.getElementById('captureBtn');
            const faceStatus = document.getElementById('faceStatus');
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 400 },
                    height: { ideal: 300 },
                    facingMode: 'user'
                } 
            })
            .then(function(mediaStream) {
                stream = mediaStream;
                video.srcObject = stream;
                
                cameraContainer.style.display = 'block';
                startBtn.style.display = 'none';
                captureBtn.style.display = 'inline-block';
                captureBtn.disabled = true;

                faceStatus.innerHTML = '<i class="bi bi-search me-2"></i>Scanning face... Keep face straight and stay in frame.';
                faceStatus.className = 'status-message status-info';

                video.onloadedmetadata = () => {
                    startLiveFaceDetection();
                };
            })
            .catch(function(error) {
                console.error('Camera access error:', error);
                faceStatus.innerHTML = '<i class="bi bi-x-circle me-2"></i>Camera access required. Please allow camera permission.';
                faceStatus.className = 'status-message status-error';
                document.getElementById('startCameraBtn').style.display = 'inline-block';
                document.getElementById('startCameraBtn').disabled = false;
            });
        }

        function startLiveFaceDetection() {
            stopLiveFaceDetection();
            detectionInterval = setInterval(detectSingleFrame, 700);
        }

        function stopLiveFaceDetection() {
            if (detectionInterval) {
                clearInterval(detectionInterval);
                detectionInterval = null;
            }
        }

        function drawDetectionBox(box, color = '#28a745') {
            const video = document.getElementById('cameraVideo');
            const detectionCanvas = document.getElementById('detectionCanvas');
            const ctx = detectionCanvas.getContext('2d');

            if (!video.videoWidth || !video.videoHeight) {
                return;
            }

            detectionCanvas.width = video.clientWidth;
            detectionCanvas.height = video.clientHeight;
            ctx.clearRect(0, 0, detectionCanvas.width, detectionCanvas.height);

            if (!box) {
                return;
            }

            const sx = detectionCanvas.width / video.videoWidth;
            const sy = detectionCanvas.height / video.videoHeight;
            const x = box.left * sx;
            const y = box.top * sy;
            const w = (box.right - box.left) * sx;
            const h = (box.bottom - box.top) * sy;

            ctx.lineWidth = 3;
            ctx.strokeStyle = color;
            ctx.strokeRect(x, y, w, h);
        }

        function detectSingleFrame() {
            const video = document.getElementById('cameraVideo');
            const captureBtn = document.getElementById('captureBtn');
            const faceStatus = document.getElementById('faceStatus');
            const tempCanvas = document.getElementById('captureCanvas');
            const tempCtx = tempCanvas.getContext('2d');

            if (!video.videoWidth || !video.videoHeight) {
                return;
            }

            const detectWidth = 320;
            const detectHeight = Math.round((video.videoHeight / video.videoWidth) * detectWidth);
            tempCanvas.width = detectWidth;
            tempCanvas.height = detectHeight;
            tempCtx.drawImage(video, 0, 0, detectWidth, detectHeight);

            const frameData = tempCanvas.toDataURL('image/jpeg', 0.7);

            fetch('/attendance/detect-face', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    face_image_data: frameData
                })
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    detectionErrorStreak += 1;
                    liveFaceDetected = false;
                    captureBtn.disabled = true;
                    faceStatus.innerHTML = `<i class="bi bi-x-circle me-2"></i>${data.message || 'Face detection failed'}`;
                    faceStatus.className = 'status-message status-error';
                    drawDetectionBox(null);

                    if (detectionErrorStreak >= 3) {
                        stopLiveFaceDetection();
                        faceStatus.innerHTML = '<i class="bi bi-x-circle me-2"></i>Face detection stopped due to repeated server errors. Check AWS Rekognition configuration and restart camera.';
                    }
                    return;
                }

                detectionErrorStreak = 0;

                if (data.face_detected && data.bounding_box) {
                    const scaleX = video.videoWidth / detectWidth;
                    const scaleY = video.videoHeight / detectHeight;
                    const mappedBox = {
                        top: Math.round(data.bounding_box.top * scaleY),
                        right: Math.round(data.bounding_box.right * scaleX),
                        bottom: Math.round(data.bounding_box.bottom * scaleY),
                        left: Math.round(data.bounding_box.left * scaleX)
                    };

                    const good = Boolean(data.can_capture);
                    liveFaceDetected = good;
                    captureBtn.disabled = !good;
                    drawDetectionBox(mappedBox, good ? '#28a745' : '#ffc107');

                    faceStatus.innerHTML = `<i class="bi ${good ? 'bi-check-circle' : 'bi-exclamation-triangle'} me-2"></i>${data.message}`;
                    faceStatus.className = good ? 'status-message status-success' : 'status-message status-info';
                    return;
                }

                liveFaceDetected = false;
                captureBtn.disabled = true;
                drawDetectionBox(null);
                faceStatus.innerHTML = `<i class="bi bi-x-circle me-2"></i>${data.message}`;
                faceStatus.className = 'status-message status-error';
            })
            .catch(() => {
                detectionErrorStreak += 1;
                liveFaceDetected = false;
                captureBtn.disabled = true;
                drawDetectionBox(null);

                if (detectionErrorStreak >= 3) {
                    stopLiveFaceDetection();
                    faceStatus.innerHTML = '<i class="bi bi-x-circle me-2"></i>Unable to reach face detection service. Check server and AWS Rekognition settings, then restart camera.';
                    faceStatus.className = 'status-message status-error';
                }
            });
        }
        
        function capturePhoto() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('captureCanvas');
            const ctx = canvas.getContext('2d');

            if (!liveFaceDetected) {
                const faceStatus = document.getElementById('faceStatus');
                faceStatus.innerHTML = '<i class="bi bi-x-circle me-2"></i>Face not detected. Please align your face properly.';
                faceStatus.className = 'status-message status-error';
                return;
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0);
            
            faceImageData = canvas.toDataURL('image/jpeg', 0.8);
            
            // Show preview
            const previewImg = document.getElementById('previewImage');
            previewImg.src = faceImageData;
            
            // Update UI
            document.getElementById('capturedPreview').style.display = 'block';
            document.getElementById('cameraContainer').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('retakeBtn').style.display = 'inline-block';
            document.getElementById('startCameraBtn').disabled = true;

            stopLiveFaceDetection();
            drawDetectionBox(null);
            
            // Stop camera
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            // Reset face verification status
            faceVerified = false;
            checkRequirements();
            
            // Auto-trigger face verification and attendance marking after capture
            setTimeout(() => {
                if (faceImageData && userLocation) {
                    autoMarkAttendance();
                }
            }, 1000);
        }
        
        function retakePhoto() {
            // Reset UI
            document.getElementById('capturedPreview').style.display = 'none';
            document.getElementById('startCameraBtn').style.display = 'inline-block';
            document.getElementById('retakeBtn').style.display = 'none';
            document.getElementById('startCameraBtn').disabled = !userLocation;
            
            // Reset face status
            const faceStatus = document.getElementById('faceStatus');
            faceStatus.innerHTML = '<i class="bi bi-camera me-2"></i>Click "Start Camera" to verify your identity';
            faceStatus.className = 'status-message status-info';
            
            faceImageData = null;
            faceVerified = false;
            liveFaceDetected = false;
            checkRequirements();
        }

        function autoMarkAttendance() {
            if (!userLocation || !faceImageData) {
                return;
            }

            const faceStatus = document.getElementById('faceStatus');

            faceStatus.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Verifying face and marking attendance...';
            faceStatus.className = 'status-message status-info';

            fetch('/attendance/auto-mark', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    company_id: companyId,
                    latitude: userLocation.latitude,
                    longitude: userLocation.longitude,
                    face_image_data: faceImageData
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    faceVerified = true;
                    faceStatus.innerHTML = `<i class="bi bi-check-circle me-2"></i>Attendance marked successfully`;
                    faceStatus.className = 'status-message status-success';

                    checkRequirements();

                    const successHtml = `
                        <div class="success-card">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 2.4rem;"></i>
                            <h4>Attendance marked successfully</h4>
                            <div>
                                <strong>Employee:</strong> ${data.employee_name}<br>
                                <strong>Company:</strong> ${data.company_name}<br>
                                <strong>Time:</strong> ${data.timestamp}
                            </div>
                        </div>
                    `;
                    document.getElementById('successMessage').innerHTML = successHtml;
                    document.getElementById('successMessage').style.display = 'block';

                    document.querySelectorAll('.form-section').forEach(section => {
                        section.style.display = 'none';
                    });

                    renderMealPrompt(data.employee_id);
                } else {
                    faceVerified = false;
                    faceStatus.innerHTML = `<i class="bi bi-x-circle me-2"></i>${data.message}`;
                    faceStatus.className = 'status-message status-error';
                    document.getElementById('retakeBtn').style.display = 'inline-block';
                    checkRequirements();
                }
            })
            .catch(error => {
                console.error('Auto attendance error:', error);
                faceVerified = false;
                faceStatus.innerHTML = '<i class="bi bi-x-circle me-2"></i>Failed to mark attendance. Please try again.';
                faceStatus.className = 'status-message status-error';
                document.getElementById('retakeBtn').style.display = 'inline-block';
                checkRequirements();
            });
        }

        function renderMealPrompt(employeeId) {
            const promptSection = document.getElementById('mealPromptSection');
            const resultSection = document.getElementById('mealResultSection');
            const menuSection = document.getElementById('menuDisplaySection');

            resultSection.style.display = 'none';
            menuSection.style.display = 'none';

            promptSection.innerHTML = `
                <div class="meal-prompt-card">
                    <h6>Are you coming for meal today?</h6>
                    <div class="meal-actions">
                        <button class="btn-meal-yes" onclick="submitMealResponse('${employeeId}', 'Coming')">YES</button>
                        <button class="btn-meal-no" onclick="submitMealResponse('${employeeId}', 'Not Coming')">NO</button>
                    </div>
                </div>
            `;
            promptSection.style.display = 'block';
        }

        function submitMealResponse(employeeId, status) {
            const promptSection = document.getElementById('mealPromptSection');
            const resultSection = document.getElementById('mealResultSection');
            const menuSection = document.getElementById('menuDisplaySection');

            promptSection.querySelectorAll('button').forEach(btn => {
                btn.disabled = true;
            });

            fetch('/attendance/meal-response', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    employee_id: employeeId,
                    company_id: companyId,
                    status: status
                })
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    throw new Error(data.message || 'Unable to save meal response');
                }

                resultSection.innerHTML = `<div class="meal-feedback"><i class="bi bi-check2-circle me-2"></i>${data.message}</div>`;
                resultSection.style.display = 'block';
                promptSection.style.display = 'none';

                if (status === 'Coming') {
                    renderTodayMenu(data.menu);
                } else {
                    menuSection.style.display = 'none';
                }
            })
            .catch(error => {
                resultSection.innerHTML = `<div class="meal-feedback"><i class="bi bi-x-circle me-2"></i>${error.message || 'Failed to save meal response'}</div>`;
                resultSection.style.display = 'block';

                promptSection.querySelectorAll('button').forEach(btn => {
                    btn.disabled = false;
                });
            });
        }

        function renderTodayMenu(menu) {
            const menuSection = document.getElementById('menuDisplaySection');
            if (!menu) {
                menuSection.innerHTML = '<div class="meal-feedback">Menu is not published yet for today.</div>';
                menuSection.style.display = 'block';
                return;
            }

            menuSection.innerHTML = `
                <div class="menu-display">
                    <h6><i class="bi bi-journal-check me-2"></i>Today Menu</h6>
                    <div class="menu-item"><span>Breakfast</span><strong>${menu.morning}</strong></div>
                    <div class="menu-item"><span>Lunch</span><strong>${menu.afternoon}</strong></div>
                    <div class="menu-item"><span>Evening</span><strong>${menu.evening}</strong></div>
                </div>
            `;
            menuSection.style.display = 'block';
        }
        
        // Cleanup camera on page unload
        window.addEventListener('beforeunload', function() {
            stopLiveFaceDetection();
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
        
        // Initialize requirements check
        checkRequirements();
        autoDetectLocation();
    </script>
</body>
</html>
