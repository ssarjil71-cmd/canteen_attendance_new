<!DOCTYPE html>
<html>
<head>
    <title>{{ role|capitalize }} Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>{{ role|capitalize }} Login</h2>
        <p>Sign in to continue to your dashboard.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {{ 'alert-error' if category == 'error' else 'alert-success' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="form-grid">
            <input type="text" name="username" placeholder="{{ 'Company ID' if role == 'company' else 'Username or Email' }}" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>

        <a href="/" class="back-link">← Back to role selection</a>
    </div>
</div>

<script src="/static/js/script.js"></script>
</body>
</html>
