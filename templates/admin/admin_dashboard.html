{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="panel">
	<h2>Admin Dashboard</h2>
	<p>View total companies and total managers. Use a specific company filter if needed.</p>

	<form method="GET" class="form-grid" style="max-width: 380px; margin-top: 16px;">
		<label>Company Filter</label>
		<select name="company_id" onchange="this.form.submit()">
			<option value="">All Companies</option>
			{% for company in companies %}
			<option value="{{ company.id }}" {% if selected_company_id == company.id %}selected{% endif %}>
				{{ company.company_name }}
			</option>
			{% endfor %}
		</select>
	</form>

	<div class="stats-grid">
		<div class="stat-card">
			<h4>Total Companies</h4>
			<h3>{{ total_companies }}</h3>
		</div>
		<div class="stat-card">
			<h4>Total Managers</h4>
			<h3>{{ total_managers }}</h3>
		</div>
	</div>
</div>
{% endblock %}
