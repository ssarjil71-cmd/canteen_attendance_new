{% extends "base.html" %}

{% block title %}Add Company{% endblock %}

{% block content %}
<div class="panel form-panel add-company-panel">
	<h2>Add Company</h2>
	<p>Create a new company and set credentials for company login.</p>

	<form method="POST" enctype="multipart/form-data" class="add-company-form row g-4" id="addCompanyForm">
		<div class="col-12 col-md-6">
			<label class="form-label">Name</label>
			<input type="text" name="company_name" class="form-control validate-field" placeholder="Enter company name" required>
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Email</label>
			<input type="email" name="email" class="form-control validate-field" placeholder="Enter company email" required>
			<small class="field-hint"></small>
		</div>

		<div class="col-12">
			<label class="form-label">Address</label>
			<input type="text" name="address" class="form-control validate-field" placeholder="Enter address" required>
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Phone Number</label>
			<input type="tel" name="phone" class="form-control validate-field" placeholder="Enter phone number">
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">City</label>
			<input type="text" name="city" class="form-control validate-field" placeholder="Enter city">
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">State</label>
			<input type="text" name="state" class="form-control validate-field" placeholder="Enter state">
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Pincode</label>
			<input type="text" name="pincode" class="form-control validate-field" placeholder="Enter pincode">
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">GST Number</label>
			<input type="text" name="gst_number" class="form-control validate-field" placeholder="Enter GST number (optional)">
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Password</label>
			<input type="password" name="password" id="password" class="form-control validate-field" placeholder="Set company login password" required>
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Confirm Password</label>
			<input type="password" name="confirm_password" id="confirm_password" class="form-control validate-field" placeholder="Confirm company login password" required>
			<small class="field-hint"></small>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Company Logo</label>
			<input type="file" name="logo" accept="image/*" class="form-control validate-field" required>
			<small class="field-hint"></small>
		</div>

		<div class="col-12">
			<div class="location-section p-3 border rounded bg-light">
				<h5 class="mb-3">Location Settings</h5>
				<div class="row g-3 align-items-end">
					<div class="col-12 col-md-4">
						<label class="form-label">Latitude</label>
						<input type="text" name="latitude" id="latitude" class="form-control validate-field" placeholder="Latitude" required>
						<small class="field-hint"></small>
					</div>
					<div class="col-12 col-md-4">
						<label class="form-label">Longitude</label>
						<input type="text" name="longitude" id="longitude" class="form-control validate-field" placeholder="Longitude" required>
						<small class="field-hint"></small>
					</div>
					<div class="col-12 col-md-4 d-grid">
						<button type="button" class="btn location-btn" onclick="getLocation()">
							<i class="bi bi-geo-alt"></i> Get Current Location
						</button>
					</div>
				</div>
				<div class="row mt-1">
					<div class="col-12 col-md-6">
						<label class="form-label">Allowed Radius (meters)</label>
						<input type="number" name="radius" class="form-control validate-field" placeholder="e.g. 100" min="1" required>
						<small class="field-hint"></small>
					</div>
				</div>
			</div>
		</div>

		<div class="col-12">
			<label class="form-label">Modules</label>
			<div class="checkbox-group">
				<label class="checkbox-item">
					<input type="checkbox" name="attendance_module_enabled" value="1" checked>
					Attendance
				</label>
				<label class="checkbox-item">
					<input type="checkbox" name="canteen_module_enabled" value="1" checked>
					Canteen Management
				</label>
			</div>
		</div>

		<div class="col-12 mt-4 d-grid save-company-row">
			<button class="btn save-company-btn" type="submit">Save Company</button>
		</div>
	</form>

	<script>
	// Relaxed validation rules for user-friendly experience
	const validationRules = {
		company_name: {
			required: true,
			message: 'Company name is required'
		},
		email: {
			required: true,
			validate: (val) => val.includes('@') && val.includes('.'),
			message: 'Email should contain @ and .'
		},
		address: {
			required: true,
			message: 'Address is required'
		},
		phone: {
			validate: (val) => val === '' || /^[0-9]{10}$/.test(val),
			message: 'Phone number should be exactly 10 digits'
		},
		pincode: {
			validate: (val) => val === '' || /^[0-9]{5,6}$/.test(val),
			message: 'Pincode should be 5-6 digits'
		},
		gst_number: {
			validate: (val) => val === '' || /^[0-9]{15}$|^[A-Z0-9]{15}$/.test(val),
			message: 'Invalid GST format (optional)'
		},
		password: {
			required: true,
			minLength: 4,
			message: 'Password must be at least 4 characters'
		},
		confirm_password: {
			required: true,
			message: 'Please confirm password'
		},
		latitude: {
			required: true,
			validate: (val) => val === '' || /^-?[0-9]{1,3}\.[0-9]{1,}$/.test(val),
			message: 'Invalid latitude format'
		},
		longitude: {
			required: true,
			validate: (val) => val === '' || /^-?[0-9]{1,3}\.[0-9]{1,}$/.test(val),
			message: 'Invalid longitude format'
		},
		radius: {
			required: true,
			message: 'Radius is required'
		}
	};

	function validateField(input) {
		const name = input.name;
		const value = input.value.trim();
		const rule = validationRules[name];
		const hint = input.nextElementSibling;

		if (!rule) return true;

		// Check required
		if (rule.required && value === '') {
			showHint(input, hint, rule.message);
			return false;
		}

		// Check minLength
		if (rule.minLength && value && value.length < rule.minLength) {
			showHint(input, hint, rule.message);
			return false;
		}

		// Check custom validation
		if (rule.validate && value && !rule.validate(value)) {
			showHint(input, hint, rule.message);
			return false;
		}

		// All good
		clearHint(input, hint);
		return true;
	}

	function showHint(input, hint, message) {
		input.classList.add('has-warning');
		if (hint && hint.classList.contains('field-hint')) {
			hint.textContent = message;
			hint.style.display = 'block';
		}
	}

	function clearHint(input, hint) {
		input.classList.remove('has-warning');
		if (hint && hint.classList.contains('field-hint')) {
			hint.textContent = '';
			hint.style.display = 'none';
		}
	}

	// Add blur validation to all fields
	document.querySelectorAll('.validate-field').forEach(input => {
		input.addEventListener('blur', function() {
			validateField(this);
		});

		// Clear hint when user starts fixing the input
		input.addEventListener('input', function() {
			if (this.classList.contains('has-warning')) {
				validateField(this);
			}
		});

		input.addEventListener('change', function() {
			if (this.classList.contains('has-warning')) {
				validateField(this);
			}
		});
	});

	// Form submission - check critical fields only, allow submit even with warnings
	document.getElementById('addCompanyForm').addEventListener('submit', function(e) {
		const password = document.getElementById('password').value;
		const confirmPassword = document.getElementById('confirm_password').value;

		// Only block if passwords don't match
		if (password && confirmPassword && password !== confirmPassword) {
			e.preventDefault();
			const confirmInput = document.getElementById('confirm_password');
			const hint = confirmInput.nextElementSibling;
			showHint(confirmInput, hint, 'Passwords do not match');
			confirmInput.focus();
		}
	});

	function getLocation() {
		if (navigator.geolocation) {
			navigator.geolocation.getCurrentPosition(function(position) {
				document.getElementById('latitude').value = position.coords.latitude;
				document.getElementById('longitude').value = position.coords.longitude;
			}, function(error) {
				alert('Unable to retrieve your location.');
			});
		} else {
			alert('Geolocation is not supported by this browser.');
		}
	}

	const companyNameInput = document.getElementById('company_name');
	const companyCodeInput = document.getElementById('company_code');

	async function generateCompanyId() {
		const companyName = companyNameInput.value.trim();
		if (!companyName) {
			companyCodeInput.value = '';
			return;
		}

		try {
			const response = await fetch(`/admin/generate_company_id?company_name=${encodeURIComponent(companyName)}`);
			if (!response.ok) return;
			const data = await response.json();
			companyCodeInput.value = data.company_id || '';
		} catch (error) {
			companyCodeInput.value = '';
		}
	}

	companyNameInput.addEventListener('blur', generateCompanyId);
	companyNameInput.addEventListener('input', function() {
		if (!this.value.trim()) {
			companyCodeInput.value = '';
		}
	});
	</script>
</div>
{% endblock %}
