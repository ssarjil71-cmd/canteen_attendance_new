{% extends "base.html" %}

{% block title %}Add Company{% endblock %}

{% block content %}
<div class="panel form-panel add-company-panel">
	<h2>Add Company</h2>
	<p>Create a new company and set credentials for company login.</p>

	<form method="POST" enctype="multipart/form-data" class="add-company-form row g-4">
		<div class="col-12 col-md-6">
			<label class="form-label">Name</label>
			<input type="text" name="company_name" class="form-control" placeholder="Enter company name" required>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Email</label>
			<input type="email" name="email" class="form-control" placeholder="Enter company email" required>
		</div>

		<div class="col-12">
			<label class="form-label">Address</label>
			<input type="text" name="address" class="form-control" placeholder="Enter address" required>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Phone Number</label>
			<input type="tel" name="phone" class="form-control" placeholder="Enter phone number">
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">City</label>
			<input type="text" name="city" class="form-control" placeholder="Enter city">
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">State</label>
			<input type="text" name="state" class="form-control" placeholder="Enter state">
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Pincode</label>
			<input type="text" name="pincode" class="form-control" placeholder="Enter pincode">
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">GST Number</label>
			<input type="text" name="gst_number" class="form-control" placeholder="Enter GST number (optional)">
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Password</label>
			<input type="password" name="password" class="form-control" placeholder="Set company login password" required>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Confirm Password</label>
			<input type="password" name="confirm_password" class="form-control" placeholder="Confirm company login password" required>
		</div>

		<div class="col-12 col-md-6">
			<label class="form-label">Company Logo</label>
			<input type="file" name="logo" accept="image/*" class="form-control" required>
		</div>

		<div class="col-12">
			<div class="location-section p-3 border rounded bg-light">
				<h5 class="mb-3">Location Settings</h5>
				<div class="row g-3 align-items-end">
					<div class="col-12 col-md-4">
						<label class="form-label">Latitude</label>
						<input type="text" name="latitude" id="latitude" class="form-control" placeholder="Latitude" required>
					</div>
					<div class="col-12 col-md-4">
						<label class="form-label">Longitude</label>
						<input type="text" name="longitude" id="longitude" class="form-control" placeholder="Longitude" required>
					</div>
					<div class="col-12 col-md-4 d-grid">
						<button type="button" class="btn location-btn" onclick="getLocation()">
							<i class="bi bi-geo-alt"></i> Get Current Location
						</button>
					</div>
				</div>
				<div class="row mt-1">
					<div class="col-12 col-md-6">
						<label class="form-label">Allowed Radius (meters)</label>
						<input type="number" name="radius" class="form-control" placeholder="e.g. 100" min="1" required>
					</div>
				</div>
			</div>
		</div>

		<div class="col-12">
			<label class="form-label">Modules</label>
			<div class="checkbox-group">
				<label class="checkbox-item">
					<input type="checkbox" name="attendance_module_enabled" value="1" checked>
					Attendance
				</label>
				<label class="checkbox-item">
					<input type="checkbox" name="canteen_module_enabled" value="1" checked>
					Canteen Management
				</label>
			</div>
		</div>

		<div class="col-12 mt-4 d-grid save-company-row">
			<button class="btn save-company-btn" type="submit">Save Company</button>
		</div>
	</form>

	<script>
	function getLocation() {
		if (navigator.geolocation) {
			navigator.geolocation.getCurrentPosition(function(position) {
				document.getElementById('latitude').value = position.coords.latitude;
				document.getElementById('longitude').value = position.coords.longitude;
			}, function(error) {
				alert('Unable to retrieve your location.');
			});
		} else {
			alert('Geolocation is not supported by this browser.');
		}
	}
	</script>
</div>
{% endblock %}
