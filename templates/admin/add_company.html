{% extends "base.html" %}

{% block title %}Add Company{% endblock %}

{% block content %}
<div class="panel form-panel">
	<h2>Add Company</h2>
	<p>Create a new company that can be assigned to managers.</p>

	<form method="POST" class="form-grid">
		<label>Name</label>
		<input type="text" name="company_name" placeholder="Enter company name" required>

		<label>Address</label>
		<input type="text" name="address" placeholder="Enter address">

		<label>Email</label>
		<input type="email" name="email" placeholder="Enter company email" required>

		<label>Password</label>
		<input type="password" name="password" placeholder="Enter company login password" required>

		<label>Company ID</label>
		<input type="text" name="company_code" placeholder="Enter company code" required>

		<label>Modules</label>
		<div class="checkbox-group">
			<label class="checkbox-item">
				<input type="checkbox" name="attendance_module_enabled" value="1" checked>
				Attendance
			</label>
			<label class="checkbox-item">
				<input type="checkbox" name="canteen_module_enabled" value="1" checked>
				Canteen Management
			</label>
		</div>

		<button class="btn" type="submit">Save Company</button>
	</form>
</div>
{% endblock %}
