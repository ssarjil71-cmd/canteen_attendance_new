{% extends "base.html" %}

{% block title %}Add Company{% endblock %}

{% block content %}
<div class="panel form-panel">
	<h2>Add Company</h2>
	<p>Create a new company and set credentials for company login.</p>

	<form method="POST" enctype="multipart/form-data" class="form-grid">
		<label>Name</label>
		<input type="text" name="company_name" placeholder="Enter company name" required>

		<label>Address</label>
		<input type="text" name="address" placeholder="Enter address" required>

		<label>Email</label>
		<input type="email" name="email" placeholder="Enter company email" required>

		<label>Company ID</label>
		<input type="text" name="company_code" placeholder="Enter company code" required>

		<label>Password</label>
		<input type="password" name="password" placeholder="Set company login password" required>

		<label>Confirm Password</label>
		<input type="password" name="confirm_password" placeholder="Confirm company login password" required>

		<label>Company Logo</label>
		<input type="file" name="logo" accept="image/*" class="form-control" required>

		<!-- Location Settings Section -->
		<div class="location-section mt-4 mb-3 p-3 border rounded bg-light">
			<h5 class="mb-3">Location Settings</h5>
			<div class="row g-2 align-items-end">
				<div class="col-md-4">
					<label>Latitude</label>
					<input type="text" name="latitude" id="latitude" class="form-control" placeholder="Latitude" required>
				</div>
				<div class="col-md-4">
					<label>Longitude</label>
					<input type="text" name="longitude" id="longitude" class="form-control" placeholder="Longitude" required>
				</div>
				<div class="col-md-4 d-flex align-items-end">
					<button type="button" class="btn btn-outline-primary w-100" onclick="getLocation()">
						<i class="bi bi-geo-alt"></i> Get Current Location
					</button>
				</div>
			</div>
			<div class="row mt-3">
				<div class="col-md-6">
					<label>Allowed Radius (meters)</label>
					<input type="number" name="radius" class="form-control" placeholder="e.g. 100" min="1" required>
				</div>
			</div>
		</div>

		<label>Modules</label>
		<div class="checkbox-group">
			<label class="checkbox-item">
				<input type="checkbox" name="attendance_module_enabled" value="1" checked>
				Attendance
			</label>
			<label class="checkbox-item">
				<input type="checkbox" name="canteen_module_enabled" value="1" checked>
				Canteen Management
			</label>
		</div>

		<button class="btn" type="submit">Save Company</button>
	</form>

	<script>
	function getLocation() {
		if (navigator.geolocation) {
			navigator.geolocation.getCurrentPosition(function(position) {
				document.getElementById('latitude').value = position.coords.latitude;
				document.getElementById('longitude').value = position.coords.longitude;
			}, function(error) {
				alert('Unable to retrieve your location.');
			});
		} else {
			alert('Geolocation is not supported by this browser.');
		}
	}
	</script>
</div>
{% endblock %}
