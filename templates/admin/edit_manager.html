{% extends "base.html" %}

{% block title %}Edit Manager{% endblock %}

{% block content %}
<div class="panel form-panel">
	<h2>Edit Manager</h2>
	<p>Update manager details and company assignment.</p>

	<form method="POST" class="form-grid">
		<label>Name</label>
		<input type="text" name="full_name" value="{{ manager.full_name or '' }}" required>

		<label>Email</label>
		<input type="email" name="email" value="{{ manager.email or '' }}" required>

		<label>Assign Company</label>
		<select name="company_id" required>
			<option value="">Select Company</option>
			{% for company in companies %}
			<option value="{{ company.id }}" {% if manager.company_id == company.id %}selected{% endif %}>{{ company.company_name }}</option>
			{% endfor %}
		</select>

		<label>Create Password (optional)</label>
		<input type="password" name="password" placeholder="Leave blank to keep old password">

		<label>Confirm Password</label>
		<input type="password" name="confirm_password" placeholder="Re-enter password if changing">

		<button class="btn" type="submit">Update Manager</button>
	</form>
</div>
{% endblock %}
