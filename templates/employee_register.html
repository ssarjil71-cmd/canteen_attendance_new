<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow rounded">
                    <div class="card-body">
                        <h3 class="mb-4 text-center">Employee Registration</h3>
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endif %}
                        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                        {% endwith %}
                        <form method="POST" id="employeeForm" novalidate>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="name" class="form-label">Employee Name</label>
                                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter employee name" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="emp_id" class="form-label">Employee ID</label>
                                    <input type="text" class="form-control" id="emp_id" name="emp_id" placeholder="Unique employee ID" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="gender" class="form-label">Gender</label>
                                    <select class="form-select" id="gender" name="gender" required>
                                        <option value="">Select gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="dob" class="form-label">Date of Birth</label>
                                    <input type="date" class="form-control" id="dob" name="dob" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="company" class="form-label">Company Name</label>
                                    <input type="text" class="form-control" id="company" name="company" placeholder="Enter company name" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="role" class="form-label">Role</label>
                                    <input type="text" class="form-control" id="role" name="role" placeholder="Enter role" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="department" class="form-label">Department</label>
                                    <input type="text" class="form-control" id="department" name="department" placeholder="Enter department" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="shift" class="form-label">Shift</label>
                                    <select class="form-select" id="shift" name="shift" required>
                                        <option value="">Select shift</option>
                                        <option value="Morning">Morning</option>
                                        <option value="Afternoon">Afternoon</option>
                                        <option value="Night">Night</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="joining_date" class="form-label">Joining Date</label>
                                    <input type="date" class="form-control" id="joining_date" name="joining_date" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Face Capture (Webcam)</label>
                                    <div class="mb-2">
                                        <button type="button" class="btn btn-outline-primary btn-sm me-2" id="startCamera">Start Camera</button>
                                        <button type="button" class="btn btn-outline-success btn-sm" id="capturePhoto" disabled>Capture Photo</button>
                                    </div>
                                    <div class="d-flex flex-column align-items-center">
                                        <video id="video" width="180" height="140" autoplay style="display:none; border-radius:8px;"></video>
                                        <canvas id="canvas" width="180" height="140" style="display:none; border-radius:8px;"></canvas>
                                        <img id="photoPreview" src="#" alt="Preview" class="mt-2 rounded shadow" style="display:none; max-width:180px; max-height:140px;"/>
                                    </div>
                                    <input type="hidden" name="photo_data" id="photo_data" required>
                                    <div class="form-text">Please capture a clear face photo.</div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-4">Register Employee</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Webcam logic
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let photoPreview = document.getElementById('photoPreview');
    let startCameraBtn = document.getElementById('startCamera');
    let capturePhotoBtn = document.getElementById('capturePhoto');
    let photoDataInput = document.getElementById('photo_data');
    let stream = null;

    startCameraBtn.addEventListener('click', async function() {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                canvas.style.display = 'none';
                photoPreview.style.display = 'none';
                capturePhotoBtn.disabled = false;
            } catch (err) {
                alert('Could not access camera: ' + err);
            }
        } else {
            alert('Webcam not supported in this browser.');
        }
    });

    capturePhotoBtn.addEventListener('click', function() {
        if (!stream) return;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        let dataUrl = canvas.toDataURL('image/png');
        photoPreview.src = dataUrl;
        photoPreview.style.display = 'block';
        canvas.style.display = 'none';
        video.style.display = 'none';
        photoDataInput.value = dataUrl;
        // Stop camera after capture
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        capturePhotoBtn.disabled = true;
    });

    document.getElementById('employeeForm').addEventListener('submit', function(e) {
        if (!photoDataInput.value) {
            alert('Please capture a photo before submitting.');
            e.preventDefault();
        }
    });
    </script>
</body>
</html>
